<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahaay - Premium Service Platform</title>
    <!-- Premium Google Fonts: Inter for UI, Playfair Display for accents -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital@0;1&display=swap"
        rel="stylesheet">
    <!-- Phosphor Icons (Duotone for premium feel) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Ambient subtle background effect -->
    <div class="ambient-bg"></div>

    <!-- Advanced Toast Container -->
    <div id="toast-container"></div>

    <div id="layout">
        <!-- Floating Style Sidebar Navigation -->
        <nav id="sidebar">
            <div class="sidebar-inner">
                <div class="logo">
                    <div class="logo-icon-wrapper">
                        <i class="ph-duotone ph-hands-praying"></i>
                    </div>
                    <span>Sahaay</span>
                </div>

                <div class="nav-links" id="nav-links">
                    <!-- Dynamically populated -->
                </div>

                <div class="role-selector">
                    <span class="role-label">Platform View</span>
                    <select id="role-select" onchange="window.switchRole(this.value)">
                        <option value="user">Family (User)</option>
                        <option value="lawyer">Service Partner</option>
                        <option value="admin">Admin Console</option>
                    </select>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Glassmorphic Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <h1 id="page-title">Dashboard</h1>
                    <p id="page-subtitle" class="text-muted">Manage your requirements</p>
                </div>

                <div class="topbar-actions">
                    <!-- Magical AI Read Button -->
                    <button class="btn btn-audio" onclick="window.readPageContent()" title="Read aloud" id="audio-btn">
                        <div class="audio-waves">
                            <span></span><span></span><span></span>
                        </div>
                        <span class="btn-text">Listen (Hindi)</span>
                    </button>

                    <div class="user-avatar">
                        <img src="https://ui-avatars.com/api/?name=User&background=000&color=fff&rounded=true&bold=true"
                            alt="Profile">
                    </div>
                </div>
            </header>

            <div class="app-container">
                <div id="app" class="fade-enter">
                    <!-- Dynamic Content Injected Here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modal-container"></div>

    <script src="app.js"></script>
</body>

</html>
